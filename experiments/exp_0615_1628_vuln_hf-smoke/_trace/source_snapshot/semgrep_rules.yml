rules:
  - id: prismvul.python.os-system
    message: "Use of os.system can enable command injection; prefer subprocess.run([...], shell=False)."
    languages: [python]
    severity: ERROR
    metadata:
      cwe: ["CWE-78"]
      confidence: HIGH
    pattern: os.system(...)

  - id: prismvul.python.subprocess-shell-true
    message: "subprocess with shell=True can enable command injection; avoid shell=True and pass args as a list."
    languages: [python]
    severity: ERROR
    metadata:
      cwe: ["CWE-78"]
      confidence: HIGH
    pattern: subprocess.$FUNC(..., shell=True, ...)

  - id: prismvul.python.eval
    message: "Use of eval on dynamic input can enable code injection."
    languages: [python]
    severity: ERROR
    metadata:
      cwe: ["CWE-94"]
      confidence: HIGH
    pattern: eval(...)

  - id: prismvul.python.exec
    message: "Use of exec on dynamic input can enable code injection."
    languages: [python]
    severity: ERROR
    metadata:
      cwe: ["CWE-94"]
      confidence: HIGH
    pattern: exec(...)

  - id: prismvul.python.pickle-load
    message: "Pickle deserialization of untrusted data can lead to code execution; avoid pickle for untrusted inputs."
    languages: [python]
    severity: ERROR
    metadata:
      cwe: ["CWE-502"]
      confidence: HIGH
    pattern-either:
      - pattern: pickle.loads(...)
      - pattern: pickle.load(...)
      - pattern: pickle.Unpickler(...).load(...)

  - id: prismvul.python.yaml-load-unsafe
    message: "yaml.load without SafeLoader can deserialize unsafe objects; prefer yaml.safe_load or SafeLoader."
    languages: [python]
    severity: WARNING
    metadata:
      cwe: ["CWE-502"]
      confidence: MEDIUM
    patterns:
      - pattern: yaml.load(...)
      - pattern-not: yaml.load(..., Loader=yaml.SafeLoader, ...)
      - pattern-not: yaml.load(..., Loader=SafeLoader, ...)
      - pattern-not: yaml.load(..., Loader=yaml.CSafeLoader, ...)
      - pattern-not: yaml.load(..., Loader=CSafeLoader, ...)

  - id: prismvul.python.sqlite-sql-string-format
    message: "SQL query built via string formatting can lead to SQL injection; use parameterized queries."
    languages: [python]
    severity: ERROR
    metadata:
      cwe: ["CWE-89"]
      confidence: MEDIUM
    pattern-either:
      - pattern: $DB.execute(f"...")
      - pattern: $DB.execute("..." % ...)
      - pattern: $DB.execute("...".format(...))
      - pattern: $CURSOR.execute(f"...")
      - pattern: $CURSOR.execute("..." % ...)
      - pattern: $CURSOR.execute("...".format(...))
      - pattern: $CURSOR.executemany(f"...")

  - id: prismvul.python.tempfile-mktemp
    message: "tempfile.mktemp is insecure (race condition); use NamedTemporaryFile/mkstemp instead."
    languages: [python]
    severity: WARNING
    metadata:
      cwe: ["CWE-377"]
      confidence: HIGH
    pattern: tempfile.mktemp(...)
