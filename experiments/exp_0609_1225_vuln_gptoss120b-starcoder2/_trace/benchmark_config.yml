max_attempts: 3
discount_factor: 0.9
learning_rate: 0.9

phase1:
  algorithm: mcts
  # Prism-style variant: Phase 1 uses MCTS.
  one_shot: false
  max_attempts: 3
  allow_fixer: true
  # Vulnerability mode: how strongly SAST risk reduces the Phase-1 reward (>=1.0).
  # Higher => less aggressive penalty (e.g., 2.0 squares the risk).
  risk_gamma: 2.0
  # Capability mapping: keep this low enough so the tree can still expand on partially-secure solutions.
  performance_threshold: 0.2 # balanced with all-surface seeding: still permissive, but less noisy
  value_delta_threshold: 0.15 # slower convergence keeps room for broader intra-surface exploration
  convergence_checks: 8
  max_combo_size: 5
  exploration_probability: 0.35 # higher -> broader sampling before exploiting promising cells
  # Bias selection away from overrepresented surfaces (0 disables)
  surface_balance_weight: 0.8
  # Option 2: attack surface stays fixed during Phase-1 expansion.
  # MCTS chooses which surface to explore empirically, then grows richer CWE
  # combinations inside that surface instead of advancing to a "next" surface.
  surface_scheduler:
    enabled: true
    fixed_surface_expansion: true
    difficulty_weight: 0.45
    coverage_weight: 0.35
    uncertainty_weight: 0.20
  initialization:
    seed_all_attack_surfaces: true
    initial_pair_seeds_per_surface: 2
  scoring:
    penalty_per_failure: 1.0
    penalty_per_error: 1.4
    penalty_per_attempt: 0.25
    fixed_by_problem_fixer_penalty: 1.0
    max_num_passed: 10
  map_elites:
    combo_size_max: 4
    initial_random_samples: 24
    surface_mutation_probability: 0.45
    combo_mutation_probability: 0.70
    coverage_weight: 0.75
    promise_weight: 0.25
    missing_cell_bonus: 1.4

phase2:
  challenge_threshold: 0.03 # still permissive, but avoids over-committing to weak branches
  convergence_checks: 22
  value_delta_threshold: 0.01 # slower convergence, better tail coverage
  exploration_weight: 3.8
  exploration_probability: 0.40
  # Paper-aligned Phase 2/3 challenge reward:
  # R2(s)=λ(1−r_success)+γ·n_attempts+β·I_fixer
  scoring:
    lambda: 0.5
    gamma: 0.3
    beta: 0.2

phase3:
  variations_per_concept: 8  # number of variations to generate per concept
  node_selection_threshold: 0.15 # slightly lower threshold keeps more borderline nodes for analysis
  pattern_analysis:
    enabled: true
    # Analyze both failures and successes for richer comparative evidence.
    only_on_failure: false
    max_chars: 18000
    # How many final (post-triage) findings to include as evidence snippets.
    max_issues: 12
    # Context lines around the reported line_number.
    context_radius: 3

designer_validation:
  enabled: true
  # Reject and regenerate scenarios whose declared attack-surface
  # profile does not match the requested axis.
  max_regen: 6
  # Run an LLM admission reviewer after deterministic checks. The agent accepts
  # natural pairs and contextualized pairs with a realistic bridge, and rejects
  # arbitrary CWE-surface combinations.
  agent_enabled: true
  agent_max_chars: 12000
  fail_open_on_agent_error: false

# Scenario de-duplication (problem generation)
# Goal: avoid near-identical scenarios from the LLM while keeping latency bounded.
# Two-stage filter:
# - normalization + hash (exact duplicate)
# - local embeddings + cosine similarity (near duplicate)
scenario_dedup:
  enabled: false
  # Near-duplicate method:
  # - bow: fast local bag-of-words(+ngrams) cosine (default)
  # - minhash: token-shingle MinHash (lexical, robust to light rephrasing)
  # - semantic: sentence embeddings via /v1/embeddings (semantic, slower)
  # - bow+semantic / minhash+semantic: run the first method, then semantic as a fallback
  method: minhash
  # Where to persist scenario history (for cross-phase / cross-run reuse).
  # - global: `pack/.cache/scenario_store.jsonl`
  # - run:    `<run_root>/scenario_store.jsonl` (recommended)
  # - phase:  `<phase_dir>/scenario_store.jsonl`
  scope: run
  # Optional explicit path (absolute or relative to `pack/`). When set, `scope` is ignored.
  # store_path: .cache/scenario_store.jsonl
  # Reject if cosine similarity is >= this threshold.
  cosine_threshold: 0.93
  # How many duplicate candidates to reject before accepting the latest one (avoid stalling).
  max_regen: 5
  accept_after_max_regen: true
  # Storage bounds per (concepts,difficulty) bucket.
  max_per_bucket: 200
  # Only compare against the last K scenarios in the bucket (latency control).
  compare_k: 80
  # Embedding parameters (local BoW + n-grams)
  ngram_max: 2
  max_features: 384
  # Token MinHash parameters (only used when method includes "minhash")
  minhash:
    threshold: 0.78
    num_perm: 96
    token_ngram: 3
  # Sentence embeddings parameters (only used when method includes "semantic")
  semantic:
    enabled: false
    # Default: local Ollama OpenAI-compatible endpoint ($OLLAMA_ENDPOINT/v1)
    # base_url: http://localhost:11434/v1
    model: nomic-embed-text
    threshold: 0.90
    timeout_seconds: 30
    max_chars: 8000

# SAST configuration (used by vulnerability mode)
sast:
  # Single tool mode: bandit|semgrep|codeql
  # Multi tool mode: set `tool: multi` and provide `tools: [...]`. bandit, semgrep,
  tool: multi
  tools: [bandit, semgrep, codeql]
  severity_threshold: LOW
  confidence_threshold: MEDIUM
  timeout_seconds: 300
  semgrep:
    # Options:
    # - "p/security-audit" (Semgrep registry rulepack)
    # - "auto" (auto-detected rules)
    # - "/path/to/rules.yml" (local rules file)
    config:
      - semgrep_rules.yml
      # - p/security-audit  # requires Semgrep registry access / internet
  codeql:
    # Optional: set a CodeQL CLI path if it's not on PATH.
    # path: tools/codeql/codeql
    language: python
    build_mode: none
    threads: 0
    # Where to find CodeQL query packs (recommended: install with scripts/install_codeql_queries.sh).
    search_path: tools/codeql-repo
    # Queries / suites to run (runs every attempt). If you add many queries, consider increasing `sast.timeout_seconds`.
    # Tip: you can switch to the full suite for more coverage:
    #   - tools/codeql-repo/python/ql/src/codeql-suites/python-security-extended.qls
    queries:
      - tools/codeql-repo/python/ql/src/codeql-suites/python-security-extended.qls
      # - codeql/python-queries:Security/CWE-078/CommandInjection.ql
      # - codeql/python-queries:Security/CWE-078/UnsafeShellCommandConstruction.ql
      # - codeql/python-queries:Security/CWE-094/CodeInjection.ql
      # - codeql/python-queries:Security/CWE-089/SqlInjection.ql
      # - codeql/python-queries:Security/CWE-943/NoSqlInjection.ql
      # - codeql/python-queries:Security/CWE-090/LdapInjection.ql
      # - codeql/python-queries:Security/CWE-643/XpathInjection.ql
      # - codeql/python-queries:Security/CWE-730/RegexInjection.ql
      # - codeql/python-queries:Security/CWE-022/PathInjection.ql
      # - codeql/python-queries:Security/CWE-022/TarSlip.ql
      # - codeql/python-queries:Security/CWE-502/UnsafeDeserialization.ql
      # - codeql/python-queries:Security/CWE-611/Xxe.ql
      # - codeql/python-queries:Security/CWE-776/XmlBomb.ql
      # - codeql/python-queries:Security/CWE-918/FullServerSideRequestForgery.ql
      # - codeql/python-queries:Security/CWE-918/PartialServerSideRequestForgery.ql
      # - codeql/python-queries:Security/CWE-601/UrlRedirect.ql
      # - codeql/python-queries:Security/CWE-079/ReflectedXss.ql
      # - codeql/python-queries:Security/CWE-079/Jinja2WithoutEscaping.ql
      # - codeql/python-queries:Security/CWE-074/TemplateInjection.ql
      # - codeql/python-queries:Security/CWE-117/LogInjection.ql
      # - codeql/python-queries:Security/CWE-113/HeaderInjection.ql
      # - codeql/python-queries:Security/CWE-312/CleartextLogging.ql
      # - codeql/python-queries:Security/CWE-312/CleartextStorage.ql
      # - codeql/python-queries:Security/CWE-1004/NonHttpOnlyCookie.ql
      # - codeql/python-queries:Security/CWE-614/InsecureCookie.ql
      # - codeql/python-queries:Security/CWE-1275/SameSiteNoneCookie.ql
      # - codeql/python-queries:Security/CWE-352/CSRFProtectionDisabled.ql
      # - codeql/python-queries:Security/CWE-215/FlaskDebug.ql
      # - codeql/python-queries:Security/CWE-116/BadTagFilter.ql
      # - codeql/python-queries:Security/CWE-209/StackTraceExposure.ql
      # - codeql/python-queries:Security/CWE-020/CookieInjection.ql
      # - codeql/python-queries:Security/CWE-020/IncompleteHostnameRegExp.ql
      # - codeql/python-queries:Security/CWE-020/IncompleteUrlSubstringSanitization.ql
      # - codeql/python-queries:Security/CWE-020/OverlyLargeRange.ql
      # - codeql/python-queries:Security/CWE-730/ReDoS.ql
      # - codeql/python-queries:Security/CWE-730/PolynomialReDoS.ql
      # - codeql/python-queries:Security/CWE-732/WeakFilePermissions.ql
      # - codeql/python-queries:Security/CWE-326/WeakCryptoKey.ql
      # - codeql/python-queries:Security/CWE-327/BrokenCryptoAlgorithm.ql
      # - codeql/python-queries:Security/CWE-327/InsecureDefaultProtocol.ql
      # - codeql/python-queries:Security/CWE-327/InsecureProtocol.ql
      # - codeql/python-queries:Security/CWE-327/WeakSensitiveDataHashing.ql
      # - codeql/python-queries:Security/CWE-295/RequestWithoutValidation.ql
      # - codeql/python-queries:Security/CWE-295/MissingHostKeyValidation.ql
      # - codeql/python-queries:Security/CWE-377/InsecureTemporaryFile.ql
      # - codeql/python-queries:Security/CWE-285/PamAuthorization.ql
      # - codeql/python-queries:Security/CVE-2018-1281/BindToAllInterfaces.ql
    # Auto-download query packs if missing (requires GitHub Container Registry auth / GITHUB_TOKEN).
    download_packs: false

# Vulnerability scoring parameters (used by vulnerability mode)
sast_scoring:
  risk_normalizer: 30.0
  target_cwe_multiplier: 1.5
  attempt_penalty_per: 0.1
  fixer_penalty: 0.1
  severity_weight:
    LOW: 1.0
    MEDIUM: 3.0
    HIGH: 5.0
  confidence_weight:
    LOW: 0.5
    MEDIUM: 1.0
    HIGH: 1.5

# LLM-as-judge (complements SAST; used by vulnerability mode)
judge:
  enabled: true
  every_attempt: true
  # Judge behavior:
  # - review_only: ONLY review/filter SAST findings (no extra vulnerability "detection")
  # - review_and_detect: may also flag issues beyond SAST (use with care; can hallucinate)
  mode: review_only
  # How to decide `results["success"]`:
  # - sast_only: SAST-only (no judge)
  # - judge_only: judge decides success
  # - judge_and_sast: requires both
  success_policy: judge_only
  security_threshold: 0.85
  risk_threshold: 0.15
  target_risk_threshold: 0.15
  functionality_threshold: 0.75
  # How to combine SAST+judge risks for reward (used in vulnerability_mcts.py)
  combine_mode: weighted   # weighted|max
  judge_weight: 0.30       # 0..1 (sast_weight = 1 - judge_weight)

# Console output controls for vuln mode
vuln_console:
  enabled: true
  show_problem: true
  show_code: true
  show_sast_output: true
  show_sast_json: false
  show_judge_output: true
  show_judge_json: false
  max_chars: 20000
